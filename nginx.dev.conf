server {
    listen 80;

    # Use Docker's embedded DNS resolver so upstream hostnames are resolved
    # at request time, not at nginx startup. This prevents nginx from failing
    # to start when the operate container isn't running yet.
    resolver 127.0.0.11 valid=10s;

    # Route API directly to the backend container, bypassing the webpack
    # dev proxy which buffers SSE responses before forwarding them.
    location /operate/api/ {
        set $operate_upstream http://host.docker.internal:4000;
        proxy_pass $operate_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location /operate {
        proxy_pass http://host.docker.internal:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # WebSocket headers needed for hot reload to work through nginx
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Rewrite Location headers from upstream so redirects preserve the
        # external host:port (e.g. webpack-dev-server redirects /operate → /operate/)
        proxy_redirect http://host.docker.internal:4000 http://$http_host;
    }

    location / {
        proxy_pass http://app:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # WebSocket headers needed for hot reload to work through nginx
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
