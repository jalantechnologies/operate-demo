name: cd_permanent_preview

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types:
      - operate-published

# Ensures permanent preview deployment has minimal read-only permissions for security
permissions:
  contents: read # Read-only access to repo contents for safer workflows
  id-token: write # Allow OIDC tokens for secure cloud authentication

jobs:
  deploy:
    # Skip version bump commits made by github-actions[bot] (only applies to push events)
    if: github.event_name != 'push' || github.event.head_commit.author.name != 'github-actions[bot]'
    runs-on: ubuntu-latest
    concurrency:
      group: cd-permanent-preview
      cancel-in-progress: true
    steps:
      - name: Checkout app
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: app

      - name: Checkout github-ci
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: jalantechnologies/github-ci
          path: platform
          ref: fad88356620fd16b87d7aef8fe909917eeaf7f19

      - name: Build Docker image
        id: build
        uses: ./platform/.github/actions/build
        with:
          app_name: operate-demo
          tag: preview
          context: app/.
          docker_registry: ${{ vars.DOCKER_REGISTRY }}
          docker_username: ${{ vars.DOCKER_USERNAME }}
          docker_password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve operate image digest
        env:
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
        run: |
          OPERATE_IMAGE="$DOCKER_USERNAME/operate"
          OPERATE_TAG="latest"
          docker pull "$OPERATE_IMAGE:$OPERATE_TAG"
          OPERATE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$OPERATE_IMAGE:$OPERATE_TAG" | cut -d'@' -f2)
          echo "OPERATE_IMAGE=$OPERATE_IMAGE" >> $GITHUB_ENV
          echo "OPERATE_TAG=$OPERATE_TAG" >> $GITHUB_ENV
          echo "OPERATE_DIGEST=$OPERATE_DIGEST" >> $GITHUB_ENV

      - name: Deploy to permanent preview
        uses: ./platform/.github/actions/deploy
        with:
          app_name: operate-demo
          app_env: preview
          app_hostname: preview--operate-demo.bettrsw.com
          branch: main
          deploy_id: ${{ github.run_number }}
          deploy_root: app/lib/kube
          deploy_labels: gh/env=preview
          deploy_image: ${{ steps.build.outputs.image_name }}
          deploy_tag: ${{ steps.build.outputs.image_tag }}
          deploy_digest: ${{ steps.build.outputs.image_digest }}
          docker_registry: ${{ vars.DOCKER_REGISTRY }}
          docker_username: ${{ vars.DOCKER_USERNAME }}
          docker_password: ${{ secrets.DOCKER_PASSWORD }}
          do_access_token: ${{ secrets.DO_ACCESS_TOKEN }}
          do_cluster_id: ${{ vars.DO_CLUSTER_ID }}
          doppler_token: ${{ secrets.DOPPLER_PREVIEW_TOKEN }}
