services:
  app:
    platform: 'linux/amd64'
    image: 'operate-demo'
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: 'development'
    environment:
      APP_ENV: 'development'
      MONGODB_URI: 'mongodb://app-db:27017/operate-demo-dev'
      CELERY_BROKER_URL: 'redis://redis:6379/0'
      CELERY_RESULT_BACKEND: 'redis://redis:6379/0'
      PIPENV_VENV_IN_PROJECT: '1'
    # Ensure dependencies are installed before starting services
    # Check if node_modules has content, not just if directory exists
    command: /bin/sh -c "([ -n \"$(ls -A node_modules 2>/dev/null)\" ] || npm install) && ([ -f .venv/bin/python ] || pipenv install --dev --python python3.12) && npm run serve"
    # Override to root user for local development to avoid bind mount permission issues
    user: root
    depends_on:
      app-db:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - '8081:8080'
      - '5556:5555'
    volumes:
      # Mount local directory to /opt/app for hot reload
      - './:/opt/app:delegated'
      # Preserve node_modules from image build
      - '/opt/app/node_modules/'
      # Preserve .venv in anonymous volume (prevents empty local .venv from breaking pipenv)
      - '/opt/app/.venv'
    working_dir: /opt/app

  nginx:
    image: nginx:alpine
    ports:
      - '3000:80'
    volumes:
      - './nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro'
    depends_on:
      - app

  operate:
    image: 'jalantechnologies/operate:latest'
    environment:
      APP_ENV: 'production'
      PUBLIC_URL: '/operate'
      OPERATE_MONGODB_URI: 'mongodb://app-db:27017/operate-dev'
      OPERATE_REDIS_URL: 'redis://redis:6379/0'
      OPERATE_ANTHROPIC_API_KEY: '${OPERATE_ANTHROPIC_API_KEY:-}'
      OPERATE_OPENAI_API_KEY: '${OPERATE_OPENAI_API_KEY:-}'
      OPERATE_HOST_APP_GITHUB_TOKEN: '${OPERATE_HOST_APP_GITHUB_TOKEN:-}'
      OPERATE_HOST_APP_GITHUB_OWNER: '${OPERATE_HOST_APP_GITHUB_OWNER:-}'
      OPERATE_HOST_APP_GITHUB_REPO: '${OPERATE_HOST_APP_GITHUB_REPO:-}'
      OPERATE_HOST_APP_GITHUB_HOST: '${OPERATE_HOST_APP_GITHUB_HOST:-}'
    depends_on:
      app-db:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - '8082:8080'

  app-db:
    image: mongo:5.0
    ports:
      - '27018:27017'
    volumes:
      - 'mongodb-data:/data/db'

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    volumes:
      - 'redis-data:/data'
    command: redis-server --appendonly yes

volumes:
  mongodb-data:
  redis-data:
